<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的个人主页</title>
    <style>
        /* 这里加了一点点样式，让按钮看起来更好看 */
        .jump-btn {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none; /* 取消下划线 */
            display: inline-block;
        }
        .jump-btn:hover {
            background-color: #0056b3; /* 鼠标悬停时颜色变深 */
        }
    </style>
</head>
<body>

    <h1>🎉 欢迎来到我的网页</h1>
    <p>点击下方的按钮，可以跳转到预设的页面：</p>

    <a href="https://www.baidu.com" target="_blank" class="jump-btn">
        点击跳转到百度
    </a>

</body>
</html>
